<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie-ridE/Order-page</title>
    <style>
        body {
            font-family: cursive;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: orange;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #payment-section {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            margin-top: 10px;
        }

        #payment-section.active {
            max-height: 300px;
            opacity: 1;
            transform: translateY(0);
        }

        .payment-options {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .pay-item {
            text-align: center;
            cursor: pointer;
        }

        .pay-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .pay-item p {
            font-size: 14px;
        }

        @media (max-width: 600px) {

            body {
                padding: 10px;
                height: auto;
                align-items: flex-start;
            }

            .box {
                width: 95%;
                padding: 15px;
                margin-top: 20px;
                border-radius: 15px;
            }

            #product-img {
                height: 220px !important;
                border-radius: 12px;
            }

            h2 {
                font-size: 22px;
                margin-top: 10px;
            }

            p {
                font-size: 14px;
                margin: 5px 0;
            }

            button {
                width: 100%;
                font-size: 16px;
                padding: 12px;
                border-radius: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="box">
        <img id="product-img" src="" alt="Product Image"
            style="width:100%; height:350px; object-fit:cover; border-radius:10px;">
        <h2 id="name"></h2>
        <p id="desc"></p>
        <p id="price"></p>
        <p id="rest"></p>

        <button onclick="payNow()">Pay Now</button>
        <div id="payment-section">
            <h3>Select Payment Method</h3>

            <div class="payment-options">
                <div class="pay-item">
                    <img onclick="clicky()"
                        src="https://cdn.nayathegana.com/services.khalti.com/static/images/khalti-ime-logo.png">
                </div>

                <div class="pay-item">
                    <img onclick="clicky()" src="https://esewa.com.np/common/images/esewa_logo.png">
                </div>

                <div class="pay-item">
                    <img onclick="clicky()" src="https://connectips.com/images/logo_connectIPS.png">
                </div>
            </div>
        </div>
    </div>
    <script>
        // Get data from URL

        const params = new URLSearchParams(window.location.search);

        const name = params.get("name");
        const price = params.get("price");
        const desc = params.get("desc");
        const rest = params.get("rest");
        const img = params.get("img");


        // Show data

        document.getElementById("product-img").src = img;
        document.getElementById("name").innerText = name;
        document.getElementById("desc").innerText = desc;
        document.getElementById("price").innerText = "Price: Rs. " + price;
        document.getElementById("rest").innerText = "Restaurant: " + rest;

        function payNow() {
            const section = document.getElementById("payment-section");

            section.classList.toggle("active");
        }
        function clicky() {
            alert("Developer is working on it.")
        }

    </script>

</body>

</html>
